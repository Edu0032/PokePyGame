services:
  - type: web
    name: pokepy-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements-api.txt
    startCommand: alembic upgrade head && uvicorn PokePY.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: POKEPY_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: POKEPY_AUTO_CREATE_TABLES
        value: "false"
      - key: POKEPY_LOG_LEVEL
        value: INFO
      - key: POKEPY_CORS_ORIGINS
        value: '["*"]'
      - key: POKEPY_ENV
        value: production
