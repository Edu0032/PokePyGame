name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate Python files
        run: python -m compileall PokePY tests

      - name: Lint
        run: ruff check PokePY tests

      - name: Type check
        run: mypy PokePY

      - name: Tests with coverage
        run: pytest --cov=PokePY --cov-report=term-missing
