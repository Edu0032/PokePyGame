name: Bug report
description: Registrar falha reproduzível no projeto
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: Explique o problema encontrado.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos necessários para reproduzir o erro.
      placeholder: |
        1. Rodar ...
        2. Clicar em ...
        3. Observar ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs ou evidências
      render: text
  - type: input
    id: environment
    attributes:
      label: Ambiente
      placeholder: "Windows 11, Python 3.11, Docker Desktop"
